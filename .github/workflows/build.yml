name: Build Python Wheel

on:
  push:
    branches:
      - main

jobs:
    build-wheel:
        runs-on: ubuntu-latest

        steps:
          - uses: actions/checkout@v4

          - uses: actions/setup-python@v5
            with:
              python-version: "3.12"

          - name: Install Build Tool
            run: pip install build

          - name: Build Wheel
            run: python -m build

          - name: Upload Wheel Artifact
            uses: actions/upload-artifact@v4
            with:
                name: python-wheel
                path: dist/*.whl

